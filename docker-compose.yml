services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: gate-counter-mosquitto
    restart: unless-stopped
    ports:
      - "1884:1883"
      - "9003:9001"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./infra/mosquitto/data:/mosquitto/data
