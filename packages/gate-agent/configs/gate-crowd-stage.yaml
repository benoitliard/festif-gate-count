gate_id: stage-main
role: bidirectional
mode: crowd-density
mqtt_url: mqtt://localhost:1884
mqtt_keepalive: 10
heartbeat_seconds: 5
epoch_wait_seconds: 2
db_path: data/{gate_id}.db
preview_port: 8601

crowd:
  engine: p2pnet
  snapshot_interval_seconds: 8     # demo cadence; 30-60s is fine in production
  source: image-file               # offline dry-run with a still
  image_path: ../../assets/festival-night.jpg

  # P2PNet (point-detection model, ShanghaiTech Part A pretrained — for dense crowds)
  # Download SHTechA.pth from joshipunitram/crowd-counting-p2p (HF Space) into
  # packages/gate-agent/data/p2pnet_shtecha.pth
  p2pnet_weights_path: data/p2pnet_shtecha.pth
  p2pnet_input_size: [640, 1024]
  p2pnet_score_threshold: 0.3

  # CSRNet (density-map model, ShanghaiTech Part B). Set engine: csrnet to use.
  csrnet_onnx_path: ../../assets/csrnet.onnx
  csrnet_input_size: [768, 1024]

  # Fallback YOLO+tiles params (used only if you flip engine: yolo-tiles).
  # YOLO undercounts heavily on dense night-time crowds — keep CSRNet on.
  yolo_model: yolov8x.pt
  yolo_conf: 0.10
  yolo_iou: 0.45
  yolo_classes: [0]
  tile_grid_rows: 4
  tile_grid_cols: 4
  tile_overlap: 0.20
  tile_inference_size: 1280
