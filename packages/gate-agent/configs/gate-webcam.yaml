gate_id: gate-webcam
role: bidirectional
mode: webcam
mqtt_url: mqtt://localhost:1884
mqtt_keepalive: 10
heartbeat_seconds: 5
epoch_wait_seconds: 2
db_path: data/{gate_id}.db
webcam_index: 0
tracking:
  min_area: 1500
  max_distance: 80
  max_age_frames: 30
  cooldown_seconds: 1.0
  downscale_width: 640
  learning_rate: -1.0
  var_threshold: 32.0
  line:
    a: [320, 0]
    b: [320, 720]
    in_side: positive
